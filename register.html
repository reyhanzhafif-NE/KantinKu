<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar — KantinKu Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.5s ease-out forwards; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    .shake { animation: shake 0.35s ease-in-out; }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: #f8fafc;
      border: 2px solid transparent;
      border-radius: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #1e293b;
      outline: none;
      transition: all 0.25s;
      box-sizing: border-box;
    }
    .input-field:focus {
      background: #ffffff;
      border-color: #2CC295;
      box-shadow: 0 0 0 4px rgba(44,194,149,0.12);
    }
    .input-field.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 4px rgba(239,68,68,0.1);
    }
    .input-field::placeholder { color: #94a3b8; }

    .strength-bar {
      height: 4px;
      border-radius: 99px;
      transition: all 0.3s;
      width: 0%;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #03624C;
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 14px rgba(3,98,76,0.3);
    }
    .btn-primary:hover  { background: #048a6a; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      display: none;
      margin-bottom: 16px;
    }
    .alert.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }
    .alert.success { background: #f0fdf4; color: #14532d; border: 1px solid #bbf7d0; display: block; }
  </style>
</head>

<body style="min-height:100vh; background:#F1F7F6; display:flex; align-items:center; justify-content:center; padding:2rem 1rem;">

  <div style="width:100%; max-width:420px;" class="fade-in">

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:2rem;">
      <div style="display:inline-flex; align-items:center; justify-content:center; width:64px; height:64px; background:#03624C; border-radius:16px; margin-bottom:1rem; box-shadow: 0 8px 24px rgba(3,98,76,0.3);">
        <span style="font-size:28px;">🏪</span>
      </div>
      <h1 style="font-size:22px; font-weight:800; color:#03624C; margin:0;">
        KantinKu <span style="font-size:10px; background:#2CC295; color:white; padding:2px 8px; border-radius:6px; font-weight:700; text-transform:uppercase; vertical-align:middle;">Pro</span>
      </h1>
      <p style="color:#64748b; font-size:14px; margin-top:4px; font-weight:500;">Buat akun baru</p>
    </div>

    <!-- Card -->
    <div style="background:white; border-radius:32px; padding:2rem; box-shadow:0 8px 32px rgba(0,0,0,0.08); border:1px solid #f1f5f9;">

      <!-- Alert -->
      <div id="alertBox" class="alert" style="display:none;"></div>

      <!-- Form -->
      <div id="registerForm">

        <!-- Nama -->
        <div style="margin-bottom:16px;">
          <label style="display:block; font-size:11px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px;">Nama Lengkap</label>
          <input type="text" id="inputNama" class="input-field" placeholder="Nama kamu">
        </div>

        <!-- Email -->
        <div style="margin-bottom:16px;">
          <label style="display:block; font-size:11px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px;">Email</label>
          <input type="email" id="inputEmail" class="input-field" placeholder="contoh@email.com">
        </div>

        <!-- Password -->
        <div style="margin-bottom:16px;">
          <label style="display:block; font-size:11px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px;">Password</label>
          <div style="position:relative;">
            <input type="password" id="inputPassword" class="input-field" placeholder="Minimal 6 karakter" oninput="checkStrength(this.value)" style="padding-right:48px;">
            <button type="button" onclick="togglePwd('inputPassword',this)" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px; line-height:1;">👁️</button>
          </div>
          <!-- Strength bar -->
          <div style="margin-top:8px;">
            <div style="width:100%; background:#f1f5f9; border-radius:99px; height:4px; overflow:hidden;">
              <div id="strengthBar" class="strength-bar"></div>
            </div>
            <p id="strengthText" style="font-size:10px; font-weight:700; margin-top:4px; color:#94a3b8;"></p>
          </div>
        </div>

        <!-- Konfirmasi Password -->
        <div style="margin-bottom:24px;">
          <label style="display:block; font-size:11px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px;">Konfirmasi Password</label>
          <div style="position:relative;">
            <input type="password" id="inputConfirm" class="input-field" placeholder="Ulangi password" style="padding-right:48px;">
            <button type="button" onclick="togglePwd('inputConfirm',this)" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px; line-height:1;">👁️</button>
          </div>
        </div>

        <!-- Tombol -->
        <button id="btnDaftar" class="btn-primary" onclick="handleRegister()">Buat Akun</button>

      </div>

      <!-- Divider -->
      <div style="display:flex; align-items:center; gap:12px; margin:20px 0;">
        <div style="flex:1; height:1px; background:#f1f5f9;"></div>
        <span style="font-size:11px; color:#94a3b8; font-weight:700; text-transform:uppercase;">atau</span>
        <div style="flex:1; height:1px; background:#f1f5f9;"></div>
      </div>

      <!-- Link login -->
      <p style="text-align:center; font-size:14px; color:#64748b;">
        Sudah punya akun?
        <a href="login.html" style="color:#03624C; font-weight:700; text-decoration:none;">Masuk di sini</a>
      </p>

    </div>

    <p style="text-align:center; font-size:11px; color:#94a3b8; margin-top:20px;">KantinKu Pro &copy; 2025</p>
  </div>

  <script>
    function togglePwd(id, btn) {
      const el = document.getElementById(id);
      el.type  = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁️' : '🙈';
    }

    function checkStrength(val) {
      const bar  = document.getElementById('strengthBar');
      const text = document.getElementById('strengthText');
      if (!val) { bar.style.width='0'; text.textContent=''; return; }

      let score = 0;
      if (val.length >= 6)           score++;
      if (val.length >= 10)          score++;
      if (/[A-Z]/.test(val))         score++;
      if (/[0-9]/.test(val))         score++;
      if (/[^A-Za-z0-9]/.test(val))  score++;

      const levels = [
        { w:'20%', c:'#ef4444', t:'Sangat lemah' },
        { w:'40%', c:'#f97316', t:'Lemah' },
        { w:'60%', c:'#f59e0b', t:'Cukup' },
        { w:'80%', c:'#22c55e', t:'Kuat' },
        { w:'100%',c:'#03624C', t:'Sangat kuat' },
      ];
      const lv = levels[Math.min(score-1, 4)] || levels[0];
      bar.style.width           = lv.w;
      bar.style.backgroundColor = lv.c;
      text.textContent          = lv.t;
      text.style.color          = lv.c;
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alertBox');
      el.textContent = msg;
      el.className   = 'alert ' + type;
      el.style.display = 'block';
    }

    function shakeForm() {
      const el = document.getElementById('registerForm');
      el.classList.add('shake');
      setTimeout(() => el.classList.remove('shake'), 400);
    }

    async function handleRegister() {
      const nama     = document.getElementById('inputNama').value.trim();
      const email    = document.getElementById('inputEmail').value.trim();
      const password = document.getElementById('inputPassword').value;
      const confirm  = document.getElementById('inputConfirm').value;
      const btn      = document.getElementById('btnDaftar');

      // Sembunyikan alert lama
      document.getElementById('alertBox').style.display = 'none';

      // Validasi
      if (!nama)            { showAlert('Nama wajib diisi!', 'error');  shakeForm(); return; }
      if (!email)           { showAlert('Email wajib diisi!', 'error'); shakeForm(); return; }
      if (password.length < 6) { showAlert('Password minimal 6 karakter!', 'error'); shakeForm(); return; }
      if (password !== confirm) { showAlert('Password dan konfirmasi tidak cocok!', 'error'); shakeForm(); return; }

      // Loading
      btn.disabled    = true;
      btn.textContent = 'Memproses...';

      try {
        const res  = await fetch('api/auth.php', {
          method:  'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body:    'action=register'
                 + '&nama='     + encodeURIComponent(nama)
                 + '&email='    + encodeURIComponent(email)
                 + '&password=' + encodeURIComponent(password)
        });

        // Cek apakah response-nya valid JSON
        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch(e) {
          // PHP mengembalikan error, tampilkan isi mentahnya
          showAlert('Error PHP: ' + text.substring(0, 200), 'error');
          btn.disabled = false; btn.textContent = 'Buat Akun';
          return;
        }

        if (data.success) {
          showAlert('✅ Akun berhasil dibuat! Mengalihkan ke halaman login...', 'success');
          setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        } else {
          showAlert(data.message || 'Pendaftaran gagal.', 'error');
          shakeForm();
          btn.disabled = false; btn.textContent = 'Buat Akun';
        }

      } catch(err) {
        showAlert('Tidak dapat terhubung ke server. Pastikan XAMPP (Apache+MySQL) berjalan!', 'error');
        shakeForm();
        btn.disabled = false; btn.textContent = 'Buat Akun';
      }
    }

    // Enter key untuk submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleRegister();
    });
  </script>

</body>
</html>
