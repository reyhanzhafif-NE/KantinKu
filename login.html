<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — KantinKu Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.5s ease-out forwards; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    .shake { animation: shake 0.35s ease-in-out; }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: #f8fafc;
      border: 2px solid transparent;
      border-radius: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #1e293b;
      outline: none;
      transition: all 0.25s;
    }
    .input-field:focus {
      background: #ffffff;
      border-color: #2CC295;
      box-shadow: 0 0 0 4px rgba(44,194,149,0.12);
    }
    .input-field.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 4px rgba(239,68,68,0.1);
    }
    .input-field::placeholder { color: #94a3b8; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #03624C;
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 14px rgba(3,98,76,0.3);
    }
    .btn-primary:hover  { background: #048a6a; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(3,98,76,0.35); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      display: none;
    }
    .alert.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .alert.success { background: #f0fdf4; color: #14532d; border: 1px solid #bbf7d0; }
    .alert.show    { display: block; }
  </style>
</head>

<body class="min-h-screen bg-[#F1F7F6] flex items-center justify-center px-4">

  <!-- Background decorations -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-[#2CC295]/10 rounded-full"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-[#03624C]/8 rounded-full"></div>
  </div>

  <!-- Card Login -->
  <div class="w-full max-w-md fade-in relative z-10">

    <!-- Logo & Judul -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-[#03624C] rounded-2xl mb-4 shadow-lg">
        <span class="text-3xl">🏪</span>
      </div>
      <h1 class="text-2xl font-extrabold text-[#03624C]">
        KantinKu <span class="text-xs bg-[#2CC295] text-white px-2 py-0.5 rounded-md ml-0.5 align-top uppercase font-bold">Pro</span>
      </h1>
      <p class="text-slate-500 text-sm font-medium mt-1">Masuk ke akunmu</p>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 p-8">

      <!-- Alert Box -->
      <div id="alertBox" class="alert mb-5"></div>

      <!-- Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">

        <!-- Email -->
        <div class="mb-4">
          <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">
            Email
          </label>
          <input
            type="email"
            id="inputEmail"
            class="input-field"
            placeholder="contoh@email.com"
            autocomplete="email"
            required>
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">
            Password
          </label>
          <div class="relative">
            <input
              type="password"
              id="inputPassword"
              class="input-field pr-12"
              placeholder="Masukkan password"
              autocomplete="current-password"
              required>
            <!-- Toggle show/hide password -->
            <button
              type="button"
              onclick="togglePassword('inputPassword', this)"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors text-lg">
              👁️
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" id="btnSubmit" class="btn-primary">
          Masuk
        </button>

      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px bg-slate-100"></div>
        <span class="text-[11px] text-slate-400 font-bold uppercase">atau</span>
        <div class="flex-1 h-px bg-slate-100"></div>
      </div>

      <!-- Link ke Register -->
      <p class="text-center text-sm text-slate-500">
        Belum punya akun?
        <a href="register.html" class="text-[#03624C] font-bold hover:text-[#2CC295] transition-colors">
          Daftar Sekarang
        </a>
      </p>

    </div>

    <!-- Footer -->
    <p class="text-center text-[11px] text-slate-400 mt-6 font-medium">
      KantinKu Pro &copy; 2025 · Cerdas Kelola Uang Saku
    </p>

  </div>

  <script>
    // ── CEK APAKAH SUDAH LOGIN ──
    // Kalau sudah punya session, langsung redirect ke dashboard
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const res  = await fetch('api/auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'action=cek_session'
        });
        const data = await res.json();
        if (data.logged_in) {
          window.location.href = 'index.html';
        }
      } catch (e) {
        // Tidak ada koneksi ke server, abaikan
        console.warn('Cek session gagal:', e);
      }
    });

    // ── TOGGLE SHOW/HIDE PASSWORD ──
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
      }
    }

    // ── TAMPILKAN ALERT ──
    function showAlert(message, type = 'error') {
      const box = document.getElementById('alertBox');
      box.textContent = message;
      box.className   = `alert ${type} show`;
    }

    function hideAlert() {
      document.getElementById('alertBox').className = 'alert';
    }

    // ── SHAKE ANIMASI KALAU ERROR ──
    function shakeForm() {
      const form = document.getElementById('loginForm');
      form.classList.add('shake');
      setTimeout(() => form.classList.remove('shake'), 400);
    }

    // ── HANDLE SUBMIT LOGIN ──
    async function handleLogin(event) {
      event.preventDefault();
      hideAlert();

      const email    = document.getElementById('inputEmail').value.trim();
      const password = document.getElementById('inputPassword').value;
      const btn      = document.getElementById('btnSubmit');

      // Validasi sisi client dulu sebelum kirim ke server
      if (!email || !password) {
        showAlert('Email dan password wajib diisi!');
        shakeForm();
        return;
      }

      // Loading state
      btn.disabled     = true;
      btn.textContent  = 'Memproses...';

      try {
        const res = await fetch('api/auth.php', {
          method:  'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body:    `action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
        });

        const data = await res.json();

        if (data.success) {
          // Login berhasil — simpan nama user di localStorage untuk ditampilkan di dashboard
          localStorage.setItem('kantinkupro_user', data.nama);

          showAlert(`Selamat datang, ${data.nama}! Mengalihkan...`, 'success');

          // Redirect ke dashboard setelah 1 detik
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);

        } else {
          showAlert(data.message || 'Login gagal, coba lagi.');
          shakeForm();
          btn.disabled    = false;
          btn.textContent = 'Masuk';
        }

      } catch (err) {
        showAlert('Tidak dapat terhubung ke server. Pastikan XAMPP berjalan.');
        shakeForm();
        btn.disabled    = false;
        btn.textContent = 'Masuk';
      }
    }
  </script>

</body>
</html>
